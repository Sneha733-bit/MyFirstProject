<!DOCTYPE html>
<html>
    <head>
        <title>
            Grid Practice
        </title>
        <style>
        .grid{
            display:grid;
            grid-template-columns: 200px 75px;
        }
        .grid-1{
            display: grid;
            grid-template-columns: 50px 1fr 50px;
            margin-top: 10px;
        }
        .grid-2{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            margin-top: 10px;
            column-gap: 20px;
            row-gap: 10px;
        }
        </style>
    </head>
    <body>
        <div class="grid">
        <div style="background-color: lightblue;">
            200px</div>
            <div style="background-color: lightpink;">
                75px
            </div>
        </div>
        <div class="grid-1">
        <div style="background-color: lightblue;">
            col1</div>
            <div style="background-color: lightpink;">
                col2
            </div>
            <div style="background-color: lightblue;">
            col3</div>
        </div>
        <div class="grid-2">
        <div style="background-color: lightblue;">
            col1</div>
            <div style="background-color: lightpink;">
                col2
            </div>
            <div style="background-color: lightblue;">
            col3</div>
            <div style="background-color: lightpink;">
                col4
            </div>
            <div style="background-color: lightpink;">
            col1</div>
            <div style="background-color: lightblue;">
                col2
            </div>
            <div style="background-color: lightpink;">
            col3</div>
            <div style="background-color: lightblue;">
                col4
            </div>

        </div>
    </body>
</html>
