<!DOCTYPE html>
<html>
    <head>
        <title>
            facebook
        </title>
        <style>
            .images{
                width: 100%;
                height:150px ;
            }
            .oliver{
                font-weight: bold;
                margin-top: 3px;
                margin-bottom: 3px;
                margin-left: 5px;
            }
            .photo{
                width:30px;
                height: 30px;
                border-radius: 30px;
            }
            
            .eh,
            .sn
            {
                display: inline-block;
                vertical-align: middle;
                margin-top: 0px;
                margin-bottom: 3px;
                margin-left:5px;
            }
            .a{
                color: white;
                background-color: blue;
                padding-left: 15px;
                padding-bottom: 10px;
                padding-right: 15px;
                padding-top: 10px;
                border: solid;
                border: none;
                border-radius: 3px;
                font-family: Arial;
                margin-left:5px;
            }
            p{
                font-family: Arial;
            }
            .m{
                font-size: 12px;
                color: rgb(96,96,96);
                
            }
            .n{
                border: none;
                width: 150px;
                border-color: rgb(136, 135, 135);
                border-width: 2px;
                border-radius: 2px;
                padding-bottom: 10px;
                 box-shadow: 5px 5px 10px rgba(0,0,0,0.15);
            }
           
               
            .grid{
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
            }
        </style>
        <body>
            <div class="grid">
                <div class="n">
               <div>
                    <img  class="images" src="cats/photo.png">
                </div>
                <div>
                    <div>
                  <p class="oliver">
                        Oliver
                    </p>
                    </div>
                    <div class="eh">
                        <img class="photo" src="cats/dog.jpg">
                    </div> 
                    <div class="sn">
                    <p class="m">
                        2 mutual friends
                    </p>
                    </div>
                    <div>
                        <button class="a">
                            Add Friends
                        </button>
                        </div>
                        </div>
                    </div>
                     <div class="n">
               <div>
                    <img  class="images" src="cats/photo-1.jpg">
                </div>
                <div>
                    <div>
                  <p class="oliver">
                        Mimi
                    </p>
                    </div>
                    <div class="eh">
                        <img class="photo" src="cats/dog.jpg">
                    </div> 
                    <div class="sn">
                    <p class="m">
                        3 mutual friends
                    </p>
                    </div>
                    <div>
                        <button class="a">
                            Add Friends
                        </button>
                        </div>
                        </div>
                    </div>
                     <div class="n">
               <div >
                    <img  class="images" src="cats/images.jpg">
                </div>
                <div>
                    <div>
                  <p class="oliver">
                      Rex
                    </p>
                    </div>
                    <div class="eh">
                        <img class="photo" src="cats/dog.jpg">
                    </div> 
                    <div class="sn">
                    <p class="m">
                        4 mutual friends
                    </p>
                    </div>
                    <div>
                        <button class="a">
                            Add Friends
                        </button>
                        </div>
                        </div>
                    </div>
            </div>
            
        </body>
    </head>
</html>
